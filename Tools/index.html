<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valheim DB Dumper - by N1h1lius</title>
    
    <style>
        :root {
            --bg-base: #0f1419;
            --bg-panel: #1a2128;
            --bg-card: #222b35;
            --accent-blue: #4a9eff;
            --accent-green: #5cb38c;
            --accent-brown: #8b6f47;
            --text-light: #e8e9eb;
            --text-muted: #a3b0c0;
            --border-radius: 8px;
        }

        body {
            background: var(--bg-base);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .nav-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: rgba(15, 20, 25, 0.98);
            border-bottom: 3px solid var(--accent-brown);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-btn {
            padding: 10px 24px;
            background: var(--bg-panel);
            border: 2px solid var(--accent-brown);
            color: var(--text-light);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.4);
        }

        .top-bar {
            background: #0a0f14;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--accent-brown);
        }
        .top-bar a {
            color: var(--accent-brown);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        .top-bar a:hover { color: var(--accent-blue); }

        .content-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--accent-green);
            margin: 20px 0;
            text-transform: capitalize;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 25px 0;
            padding: 20px;
            background: var(--bg-panel);
            border: 1px solid #333;
            border-radius: var(--border-radius);
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--accent-brown);
            text-transform: uppercase;
            font-weight: bold;
        }

        .filter-input, .filter-select {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
        }

        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid #3a4754;
            border-top: 4px solid var(--accent-brown);
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-top-color: var(--accent-blue);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .card-img-wrapper {
            background: #a3bdd6a2;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #3a4754;
        }

        .card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--accent-green);
            margin: 0 0 5px 0;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--accent-blue);
            margin-bottom: 15px;
            font-family: monospace;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-style: italic;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stat-item {
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-left: 2px solid var(--accent-brown);
        }

        .stat-label {
            color: var(--text-muted);
            text-transform: capitalize;
        }

        .stat-value {
            font-weight: bold;
            color: var(--text-light);
        }

        .list-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #444;
        }

        .list-section h4 {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            color: var(--accent-brown);
            text-transform: uppercase;
        }

        .list-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .list-section li {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .list-keyval {
            display: inline-block;
            margin-right: 10px;
        }
        .list-keyval strong {
            color: var(--accent-blue);
        }

        .loader {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
            color: var(--accent-green);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="https://github.com/n1h1lius" target="_blank">By N1h1lius</a>
        <a href="https://github.com/n1h1lius/Valheim-DB-Dumper" target="_blank">Valheim DB Dumper</a>
    </div>

    <nav>

            <button class="nav-btn" data-target="creatures">Creatures</button>
            <button class="nav-btn" data-target="items">Items</button>
            <button class="nav-btn" data-target="pickables">Pickables</button>
            <button class="nav-btn" data-target="pieces">Pieces</button>
        </div>

        function cleanString(str) {
            if (str === null || str === undefined) return "N/A";
            
            let cleaned = String(str).replace(/^\$/, "").replace(/_/g, " ").trim();
            
            cleaned = cleaned.replace(/^(item|piece|enemy|animal|prop|customization)\s+/i, "");
            
            if(cleaned.length > 0) {
                cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            }
            
            return cleaned;
        }

        function getIdentifiers(item) {
            const prefab = item.prefab_name || "";
            const name = item.item_name || item.creature_name || item.pickable_name || item.piece_name || prefab;
            const rawName = item.item_rawName || item.creature_rawName || item.pickable_rawName || item.piece_rawName || "";
            const desc = item.description || "";
            return { prefab, name: cleanString(name), rawName, desc: cleanString(desc) };
        }

        async function prefetchAllData() {
            const categories = Object.keys(CONFIG);
            
            try {

                const fetchPromises = categories.map(cat => 
                    fetch(`data/${CONFIG[cat].dir}/${cat}.json`).then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                );

                const results = await Promise.all(fetchPromises);

                categories.forEach((cat, index) => {
                    state.data[cat] = results[index];
                });

                document.querySelector('.nav-btn[data-target="recipes"]').classList.add('active');
                loadCategory('recipes');

            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="loader" style="color:#ff4a4a">
                        JSON LOADING ERROR: ${error.message}.<br>
                        Make sure you run an Open Live Server in the root of this folder. CORS issues may occur otherwise.
                        Also, make sure you have the exact same folder/files structure as the one in the repo.
                    </div>`;
            }
        }

        function loadCategory(category) {
            state.activeCategory = category;
            state.searchQuery = '';
            state.activeFilters = {};
            
            document.getElementById('current-title').textContent = category;
            document.getElementById('filters').style.display = 'flex';
            
            buildFilters();
            renderCards();
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                loadCategory(e.target.dataset.target);
            });
        });

        function buildFilters() {
            const container = document.getElementById('filters');
            container.innerHTML = '';

            const data = state.data[state.activeCategory];
            if (!data) return;

            // Barra de Búsqueda
            const searchGroup = document.createElement('div');
            searchGroup.className = 'filter-group';
            searchGroup.innerHTML = `
                <label>Search</label>
                <input type="text" class="filter-input" placeholder="Name or prefab..." id="searchInput">
            `;
            container.appendChild(searchGroup);

            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.searchQuery = e.target.value.toLowerCase();
                renderCards();
            });

            const keysToFilter = CONFIG[state.activeCategory].keysToFilter;
            keysToFilter.forEach(key => {
                const uniqueValues = [...new Set(data.map(item => item[key]).filter(v => v !== undefined && v !== null))].sort();
                
                if (uniqueValues.length > 0) {
                    const group = document.createElement('div');
                    group.className = 'filter-group';
                    
                    const select = document.createElement('select');
                    select.className = 'filter-select';
                    select.innerHTML = `<option value="">All ${key.replace(/_/g, ' ')}</option>` + 
                                       uniqueValues.map(val => `<option value="${val}">${cleanString(val)}</option>`).join('');
                    
                    select.addEventListener('change', (e) => {
                        state.activeFilters[key] = e.target.value;
                        renderCards();
                    });

                    group.innerHTML = `<label>${key.replace(/_/g, ' ')}</label>`;
                    group.appendChild(select);
                    container.appendChild(group);
                }
            });
        }

        function renderCards() {
            const data = state.data[state.activeCategory];
            const content = document.getElementById('content');
            
            const filteredData = data.filter(item => {
                const ids = getIdentifiers(item);
                const matchesSearch = ids.name.toLowerCase().includes(state.searchQuery) || 
                                      ids.prefab.toLowerCase().includes(state.searchQuery);
                
                let matchesDropdowns = true;
                for (let key in state.activeFilters) {
                    if (state.activeFilters[key] !== "" && item[key] !== state.activeFilters[key]) {
                        matchesDropdowns = false;
                        break;
                    }
                }
                return matchesSearch && matchesDropdowns;
            });

            if (filteredData.length === 0) {
                content.innerHTML = '<div class="loader">No results found.</div>';
                return;
            }

            const iconDir = CONFIG[state.activeCategory].iconDir;
            
            content.innerHTML = filteredData.map(item => {
                const ids = getIdentifiers(item);
                const imagePath = `icons/${iconDir}/${ids.prefab}.png`;

                return `
                    <div class="card">
                        <div class="card-img-wrapper">
                            <img src="${imagePath}" onerror="this.src='${fallbackImage}'" alt="${ids.name}">
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${ids.name}</h3>
                            <div class="card-subtitle">${ids.prefab}</div>
                            ${ids.desc && ids.desc !== "N/A" ? `<div class="card-desc">"${ids.desc}"</div>` : ''}
                            
                            ${generateStatsHTML(item)}
                            ${generateArraysHTML(item)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateStatsHTML(item) {
            const excludeKeys = ['prefab_name', 'item_name', 'item_rawName', 'creature_name', 'creature_rawName', 'pickable_name', 'pickable_rawName', 'piece_name', 'piece_rawName', 'description', 'drops', 'requirements', 'resources'];
            
            let html = '<div class="stats-grid">';
            for (let key in item) {
                if (excludeKeys.includes(key) || typeof item[key] === 'object') continue;
                
                html += `
                    <div class="stat-item">
                        <span class="stat-label">${cleanString(key)}</span>
                        <span class="stat-value">${cleanString(item[key])}</span>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        function generateArraysHTML(item) {
            const arraysToTrack = [
                { key: 'drops', title: 'Drops' },
                { key: 'requirements', title: 'Requirements' },
                { key: 'resources', title: 'Resources' }
            ];

            let html = '';
            arraysToTrack.forEach(arrDef => {
                if (item[arrDef.key] && Array.isArray(item[arrDef.key]) && item[arrDef.key].length > 0) {
                    html += `<div class="list-section"><h4>${arrDef.title}</h4><ul>`;
                    
                    item[arrDef.key].forEach(obj => {
                        html += `<li>`;
                        for(let subKey in obj) {
                            html += `<span class="list-keyval"><strong>${cleanString(subKey)}:</strong> ${cleanString(obj[subKey])}</span>`;
                        }
                        html += `</li>`;
                    });
                    
                    html += `</ul></div>`;
                }
            });

            return html;
        }

        window.onload = prefetchAllData;

    </script>
</body>
</html>
